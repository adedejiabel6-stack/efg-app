select option{background:#1e293b}

<div class="header">

  <button class="tab" onclick="showTab('strategies',this)">🎯 Strategies</button>

<div class="content">

<!-- DASHBOARD -->
<div id="tab-dashboard">

<!-- SCRIPTS -->
<div id="tab-scripts" class="hidden">

</div>

function showTab(name,btn){
  document.querySelectorAll('[id^="tab-"]').forEach(function(el){el.classList.add('hidden')});
  document.getElementById('tab-'+name).classList.remove('hidden');
  document.querySelectorAll('.tab').forEach(function(el){el.classList.remove('active')});
  btn.classList.add('active');
  if(name==='scripts')renderScripts('cold');
  if(name==='emails')renderEmails('precall');
  if(name==='strategies')renderStrategies('lead');
  if(name==='coaching')renderCoaching('gameplan');
}

function showSubtab(section,name,btn){
  var prefix=section+'-';
  document.querySelectorAll('[id^="'+prefix+'"]').forEach(function(el){
    if(el.id!==prefix+'content')el.classList.add('hidden');
  });
  document.getElementById(prefix+name).classList.remove('hidden');
  var parent=btn.closest('.subtab-row')||btn.parentElement;
  parent.querySelectorAll('.subtab').forEach(function(el){el.classList.remove('active')});
  btn.classList.add('active');
  if(section==='scripts')renderScripts(name);
  if(section==='emails')renderEmails(name);
  if(section==='strategies')renderStrategies(name);
  if(section==='coaching')renderCoaching(name);
}

function toggleForm(){
  document.getElementById('agent-form').classList.toggle('hidden');
}

function addAgent(){
  var name=document.getElementById('agentName').value.trim();
  if(!name)return;
  var leads=parseInt(document.getElementById('agentLeads').value)||0;
  var calls=parseInt(document.getElementById('agentCalls').value)||0;
  var closes=parseInt(document.getElementById('agentCloses').value)||0;
  var posts=parseInt(document.getElementById('agentPosts').value)||0;
  var dms=parseInt(document.getElementById('agentDMs').value)||0;
  agents.push({id:Date.now(),name:name,leads:leads,calls:calls,closes:closes,posts:posts,dms:dms});
  document.getElementById('agentName').value='';
  document.getElementById('agentLeads').value='';
  document.getElementById('agentCalls').value='';
  document.getElementById('agentCloses').value='';
  document.getElementById('agentPosts').value='';
  document.getElementById('agentDMs').value='';
  document.getElementById('agent-form').classList.add('hidden');
  renderDashboard();
}

function getScore(a){
  var s=0;
  s+=Math.min(a.leads/10,1)*25;
  s+=Math.min(a.calls/5,1)*25;
  s+=Math.min(a.closes/2,1)*30;
  s+=Math.min(a.posts/7,1)*10;
  s+=Math.min(a.dms/50,1)*10;
  return Math.round(s);
}

function getLevel(score){
  if(score>=70)return{label:'🟢 Strong',cls:'badge-green'};
  if(score>=40)return{label:'🟡 Average',cls:'badge-yellow'};
  return{label:'🔴 Needs Help',cls:'badge-red'};
}

function removeAgent(id){
  agents=agents.filter(function(a){return a.id!==id});
  renderDashboard();
}

function updateAgentMetric(id,field,delta){
  for(var i=0;i<agents.length;i++){
    if(agents[i].id===id){
      agents[i][field]=Math.max(0,agents[i][field]+delta);
      break;
    }
  }
  renderDashboard();
}

function renderDashboard(){
  var strong=0,avg=0,weak=0,totalLeads=0;
  agents.forEach(function(a){
    var s=getScore(a);
    totalLeads+=a.leads;
    if(s>=70)strong++;
    else if(s>=40)avg++;
    else weak++;
  });
  document.getElementById('totalAgents').textContent=agents.length;
  document.getElementById('topPerformers').textContent=strong;
  document.getElementById('avgPerformers').textContent=avg;
  document.getElementById('weakPerformers').textContent=weak;
  document.getElementById('totalTeamLeads').textContent=totalLeads;

  var sorted=agents.slice().sort(function(a,b){return getScore(b)-getScore(a)});
  var rankColors=['#f59e0b','#94a3b8','#cd7c2f','#64748b','#64748b'];
  var rankEmojis=['🥇','🥈','🥉','4️⃣','5️⃣'];
  var lbHtml='';
  if(sorted.length===0){
    lbHtml='<div style="text-align:center;color:#475569;padding:2rem;font-size:13px">No agents yet!</div>';
  } else {
    sorted.forEach(function(a,i){
      var score=getScore(a);
      var level=getLevel(score);
      lbHtml+='<div class="leaderboard-item">';
      lbHtml+='<div class="rank-badge" style="background:'+(rankColors[i]||'#334155')+'">'+(rankEmojis[i]||i+1)+'</div>';
      lbHtml+='<div style="flex:1"><div style="font-weight:700;font-size:14px">'+a.name+'</div>';
      lbHtml+='<div style="font-size:11px;color:#64748b">'+a.leads+' leads · '+a.calls+' calls · '+a.closes+' closes</div></div>';
      lbHtml+='<div><span class="'+level.cls+'">'+score+'%</span></div></div>';
    });
  }
  document.getElementById('leaderboard').innerHTML=lbHtml;

  var agHtml='';
  if(agents.length===0){
    agHtml='<div style="text-align:center;color:#475569;padding:1rem;font-size:13px">No agents yet.</div>';
  } else {
    agents.forEach(function(a){
      var score=getScore(a);
      var level=getLevel(score);
      var fillColor=score>=70?'#10b981':score>=40?'#f59e0b':'#ef4444';
      agHtml+='<div class="agent-card">';
      agHtml+='<div style="display:flex;justify-content:space-between;align-items:center">';
      agHtml+='<div><div class="agent-name">'+a.name+'</div><div class="agent-meta">Performance Score: '+score+'%</div></div>';
      agHtml+='<div style="display:flex;align-items:center;gap:8px"><span class="'+level.cls+'">'+level.label+'</span>';
      agHtml+='<button onclick="removeAgent('+a.id+')" style="background:none;border:none;color:#475569;cursor:pointer;font-size:14px">✕</button></div></div>';
      agHtml+='<div class="perf-bar"><div class="perf-fill" style="width:'+score+'%;background:'+fillColor+'"></div></div>';
      agHtml+='<div class="metric-row">';
      agHtml+=makeMetric(a,'leads','Leads','#60a5fa');
      agHtml+=makeMetric(a,'calls','Calls','#34d399');
      agHtml+=makeMetric(a,'closes','Closes','#a78bfa');
      agHtml+=makeMetric(a,'posts','Posts','#f59e0b');
      agHtml+=makeMetric(a,'dms','DMs','#f87171');
      agHtml+='</div></div>';
    });
  }
  document.getElementById('agentsList').innerHTML=agHtml;
}

function makeMetric(a,field,label,color){
  return '<div class="metric"><div class="metric-val" style="color:'+color+'">'+a[field]+'</div>'+
    '<div class="metric-label">'+label+'</div>'+
    '<div style="display:flex;gap:4px;justify-content:center;margin-top:4px">'+
    '<button onclick="updateAgentMetric('+a.id+',\''+field+'\',-1)" style="background:rgba(255,255,255,0.1);border:none;border-radius:5px;width:22px;height:22px;color:white;cursor:pointer;font-size:12px">-</button>'+
    '<button onclick="updateAgentMetric('+a.id+',\''+field+'\',1)" style="background:#3b82f6;border:none;border-radius:5px;width:22px;height:22px;color:white;cursor:pointer;font-size:12px">+</button>'+
    '</div></div>';
}

function escT(s){return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,'\\n')}

function renderTemplates(containerId,data){
  var html='';
  data.forEach(function(t,i){
    var id=containerId+i;
    html+='<div class="template-card">';
    html+='<div class="template-header"><div class="template-title">'+t.title+'</div>';
    var copyText=t.subject?'Subject: '+t.subject+'\n\n'+t.text:t.text;
    html+='<button class="copy-btn" id="'+id+'" onclick="copyT(\''+escT(copyText)+'\',\''+id+'\')">📋 Copy</button></div>';
    if(t.subject)html+='<div style="font-size:11px;color:#60a5fa;margin-bottom:6px">📧 '+t.subject+'</div>';
    var displayText=t.text||t.items&&t.items.join('\n');
    html+='<div class="template-text">'+(displayText||'').replace(/\n/g,'<br>')+'</div></div>';
  });
  document.getElementById(containerId).innerHTML=html;
}

function renderStrategiesSection(containerId,data){
  var html='';
  data.forEach(function(s){
    html+='<div class="strategy-card" style="border-left-color:'+s.color+'">';
    html+='<div class="strategy-title">'+s.title+'</div>';
    if(s.text){html+='<div class="template-text">'+s.text.replace(/\n/g,'<br>')+'</div>';}
    else if(s.items){s.items.forEach(function(item){html+='<div class="strategy-item"><span>✓</span><span>'+item+'</span></div>';});}
    html+='</div>';
  });
  document.getElementById(containerId).innerHTML=html;
}

function renderScripts(sub){renderTemplates('scripts-'+sub+'-content',scriptsData[sub]||[]);}
function renderEmails(sub){renderTemplates('emails-'+sub+'-content',emailsData[sub]||[]);}
function renderStrategies(sub){renderStrategiesSection('strategies-'+sub+'-content',strategiesData[sub]||[]);}
function renderCoaching(sub){renderStrategiesSection('coaching-'+sub+'-content',coachingData[sub]||[]);}

function copyT(text,btnId){
  text=text.replace(/\\n/g,'\n');
  navigator.clipboard.writeText(text).catch(function(){});
  var btn=document.getElementById(btnId);
  if(btn){btn.textContent='✅ Copied!';btn.classList.add('copied');setTimeout(function(){btn.textContent='📋 Copy';btn.classList.remove('copied')},2000);}
}

renderDashboard();
</script>
